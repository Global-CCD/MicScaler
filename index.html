<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicScaler - 1000 Track Data Engine (v1.12.0)</title>
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --primary: #bb86fc;
            --danger: #cf6679; --info: #03dac6; --warn: #ffb300; --record: #ff1744; --aura: #00e5ff;
            --text: #e0e0e0; --border: #333;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 800px; }
        #master-canvas { width: 100%; height: 80px; background: #000; border-radius: 8px; border: 1px solid var(--primary); margin-top: 10px; }
        
        .controls { background: var(--surface); padding: 15px 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; max-width: 1400px; }
        .control-group { display: flex; align-items: center; gap: 10px; }
        .divider { border-left: 1px solid #444; padding-left: 15px; }
        
        button { background-color: var(--primary); color: #000; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        button.active { background-color: var(--danger); }
        button.record-active { background-color: var(--record); color: white; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .warning-text { color: var(--danger); font-size: 0.8em; margin-left: 5px; }
        
        #track-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; width: 100%; max-width: 1600px; margin-top: 10px; }
        .track { background: var(--surface); padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .track-controls { display: flex; align-items: center; gap: 10px; }
        .invert-toggle { font-size: 0.8em; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        
        .track-input-group { background: #2a2a2a; padding: 3px 6px; border-radius: 4px; border: 1px solid #444; display: flex; align-items: center; }
        .track-input-group input { width: 75px; background: transparent; color: var(--primary); border: none; font-size: 1em; font-weight: bold; text-align: right; outline: none; }
        .track-input-group input::-webkit-outer-spin-button, .track-input-group input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .track-input-group input[type=number] { -moz-appearance: textfield; }
        
        .ui-num { padding: 4px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
        select.ui-num { cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MicScaler</h1>
        <p>Mathematical Multiplicative Scaling Engine</p>
        <canvas id="master-canvas"></canvas>
    </div>

    <!-- ROW 1: MATH ENGINE & AUTOMATION -->
    <div class="controls">
        <button id="mic-btn">Start Microphone</button>
        
        <div class="control-group divider">
            <label>Tracks: </label>
            <input type="number" id="num-tracks" class="ui-num" min="1" max="1000" value="100" style="width: 60px;">
        </div>

        <div class="control-group divider">
            <input type="checkbox" id="master-invert-toggle">
            <label style="color: var(--danger); font-weight: bold;">Master Invert</label>
        </div>

        <div class="control-group divider">
            <input type="checkbox" id="pattern-invert-toggle">
            <label style="color: var(--danger); font-weight: bold;">Invert Every:</label>
            <select id="pattern-invert-nth" class="ui-num" style="width: 65px;">
                <option value="2">2nd</option>
                <option value="3">3rd</option>
                <option value="4">4th</option>
                <option value="5">5th</option>
            </select>
        </div>

        <div class="control-group divider">
            <label>Static Step (+%): </label>
            <input type="number" id="step-size" class="ui-num" step="0.0001" value="0.0001" style="width: 80px;">
            <button id="apply-step-btn" style="background-color: var(--primary); padding: 4px 8px; font-size: 0.85em;">Apply</button>
        </div>

        <!-- NEW: DYNAMIC CUSTOM BOUNDARIES FOR AUTO-STEP -->
        <div class="control-group divider" style="border: 1px solid var(--info); padding: 5px 10px; border-radius: 4px;">
            <label style="color: var(--info); font-weight: bold;" title="Automated looping sequence">Auto-Step LFO:</label>
            <label style="font-size: 0.9em; margin-left: 5px;">Start:</label>
            <input type="number" id="auto-step-high" class="ui-num" step="0.0001" value="1.0" style="width: 60px;" title="Starting step value">
            
            <label style="font-size: 0.9em; margin-left: 5px;">End:</label>
            <input type="number" id="auto-step-low" class="ui-num" step="0.0001" value="0.0001" style="width: 75px;" title="Ending step value">
            
            <label style="font-size: 0.9em; margin-left: 5px;">Time:</label>
            <input type="number" id="auto-step-time" class="ui-num" min="1" max="600" value="15" style="width: 50px;">
            <span style="font-size:0.8em; color:#aaa;">sec</span>
            <button id="start-auto-step-btn" style="background-color: var(--info); padding: 4px 8px; font-size: 0.85em; margin-left: 5px;">Start</button>
        </div>
    </div>

    <!-- ROW 2: AURACONV ENGINE -->
    <div class="controls" style="border-color: var(--aura);">
        <div class="control-group">
            <label style="color: var(--aura); font-weight:bold;">AuraConv Comb Filter: </label>
            <input type="number" id="ac-samples" class="ui-num" min="1" max="10000" value="100" style="width: 60px;">
            <span style="font-size:0.8em; color:#aaa;">Samples</span>
            
            <select id="ac-mode" class="ui-num" style="margin-left: 5px;">
                <option value="burst">Burst (Allow)</option>
                <option value="gap">Gap (Block)</option>
            </select>
            <input type="checkbox" id="ac-enable" style="margin-left: 5px;"> <span style="font-size:0.9em;">Enable</span>
        </div>

        <div class="control-group divider">
            <input type="checkbox" id="ac-reverb"> <span style="font-size:0.9em; font-weight:bold;">Convolution Reverb</span>
        </div>

        <div class="control-group divider">
            <input type="checkbox" id="ac-rotate"> <span style="font-size:0.9em; font-weight:bold;">HRTF 3D Rotation</span>
        </div>
    </div>

    <!-- ROW 3: HARDWARE GATING & ROUTING -->
    <div class="controls" style="border-color: var(--warn);">
        <div class="control-group">
            <label title="Chops the data feeding into the 1000 tracks" style="color: var(--warn); font-weight:bold;">Math Gate (ms): </label>
            <input type="number" id="gate-ms" class="ui-num" min="0.1" max="1000" step="0.1" value="100" style="width: 65px;">
            <input type="checkbox" id="gate-enable-toggle"> <span style="font-size:0.9em;">Enable</span>
        </div>

        <div class="control-group divider" style="border: 1px solid var(--primary); padding: 5px 10px; border-radius: 4px; margin-left: 10px;">
            <label title="Physically chops the sound playing from the speakers" style="color: var(--warn); font-weight:bold;">Speaker Gate (ms): </label>
            <input type="number" id="out-gate-ms" class="ui-num" min="0.1" max="1000" step="0.1" value="100" style="width: 65px;">
            <input type="checkbox" id="out-gate-enable-toggle"> <span style="font-size:0.9em;">Enable</span>
        </div>

        <div class="control-group divider">
            <input type="checkbox" id="echo-toggle"><label>Earpiece Mode</label>
        </div>

        <div class="control-group divider">
            <input type="checkbox" id="audio-output-toggle"><label style="font-weight:bold;">Speaker Out <span class="warning-text">(!Feedback)</span></label>
        </div>
    </div>

    <!-- ROW 4: RECORDING & EXPORT -->
    <div class="controls" style="border-color: var(--record);">
        <button id="record-btn" style="background-color: var(--surface); border: 2px solid var(--record); color: white;">⏺ Start Recording</button>
        
        <div class="control-group divider">
            <label style="color: var(--text);">Auto-Stop (Mins): </label>
            <input type="number" id="record-limit-mins" class="ui-num" min="0.1" max="120" step="0.1" value="5" style="width: 60px;">
        </div>

        <div class="control-group divider">
            <label>Format: </label>
            <select id="record-format" class="ui-num">
                <option value="wav">WAV (Uncompressed)</option>
                <option value="opus">OPUS (WebM)</option>
                <option value="flac">FLAC (Lossless)</option>
            </select>
        </div>
        
        <div id="record-status" style="margin-left: 15px; color: var(--info); font-size: 0.9em; font-weight: bold;"></div>
    </div>

    <div id="track-container"></div>

    <script>
        let audioContext, analyser, microphone, stream, dataArray;
        let isRunning = false, animationId;
        let globalSampleCounter = 0; 
        
        // Audio Nodes
        let liveMathNode, keepAliveGain; 
        let fxHubIn, fxHubOut, convolver, panner; 
        let outputGain, chopperOsc, chopperGain; 

        // Auto-Toggle State Variables
        let inToggleEnabled = false;
        let inToggleMs = 100;
        let sampleCounter = 0; 

        // Recording State
        let isRecording = false, mediaRecorder = null, recordedChunks =[], recordTimeout = null;
        let scriptProcessor = null, wavAudioBuffer =[]; 

        // UI Element References
        const micBtn = document.getElementById('mic-btn');
        const numTracksInput = document.getElementById('num-tracks');
        const audioOutputToggle = document.getElementById('audio-output-toggle');
        const echoToggle = document.getElementById('echo-toggle');
        const masterInvertToggle = document.getElementById('master-invert-toggle');
        const patternInvertToggle = document.getElementById('pattern-invert-toggle');
        const patternInvertNth = document.getElementById('pattern-invert-nth');
        const applyStepBtn = document.getElementById('apply-step-btn');
        const stepSizeInput = document.getElementById('step-size');
        const trackContainer = document.getElementById('track-container');
        const masterCanvas = document.getElementById('master-canvas');
        const masterCtx = masterCanvas.getContext('2d', { alpha: false });
        
        // Output Gate Listeners
        const outGateToggleBtn = document.getElementById('out-gate-enable-toggle');
        const outGateMsInput = document.getElementById('out-gate-ms');

        // Recording Listeners
        const recordBtn = document.getElementById('record-btn');
        const recordLimitInput = document.getElementById('record-limit-mins');
        const recordFormatInput = document.getElementById('record-format');
        const recordStatus = document.getElementById('record-status');

        let tracks =[];

        function initTracks() {
            const num = Math.min(1000, Math.max(1, parseInt(numTracksInput.value)));
            trackContainer.innerHTML = '';
            tracks =[];
            const fragment = document.createDocumentFragment();

            for (let i = 0; i < num; i++) {
                let defaultScale = i < 23 ? (i + 1) * 0.01 : 5.0; 
                tracks.push({ scale: defaultScale, invert: false });
                const trackDiv = document.createElement('div');
                trackDiv.className = 'track';
                trackDiv.innerHTML = `
                    <strong>T${i + 1}</strong>
                    <div class="track-controls">
                        <label class="invert-toggle"><input type="checkbox" id="invert-${i}"> (+/-)</label>
                        <div class="track-input-group">
                            <input type="number" id="scale-input-${i}" step="0.0001" value="${defaultScale.toFixed(4)}">
                            <span>%</span>
                        </div>
                    </div>`;
                fragment.appendChild(trackDiv);
            }
            trackContainer.appendChild(fragment);

            for (let i = 0; i < num; i++) {
                document.getElementById(`scale-input-${i}`).addEventListener('input', (e) => { tracks[i].scale = parseFloat(e.target.value) || 0; });
                document.getElementById(`invert-${i}`).addEventListener('change', (e) => { tracks[i].invert = e.target.checked; });
            }
        }

        // STATIC APPLY BUTTON
        applyStepBtn.addEventListener('click', () => {
            if (tracks.length === 0) return;
            const stepValue = parseFloat(stepSizeInput.value) || 0;
            const baseScale = tracks[0].scale; 
            tracks.forEach((track, i) => {
                const newScale = Number((baseScale + (i * stepValue)).toFixed(4));
                track.scale = newScale;
                const inputEl = document.getElementById(`scale-input-${i}`);
                if (inputEl) inputEl.value = newScale.toFixed(4);
            });
        });

        // --- AUTOMATED LOOPING CUSTOM BOUNDARY LFO ---
        let autoStepActive = false;
        let autoStepStartTime = 0;
        let autoStepDurationMs = 15000;
        let autoStepAnimId;
        let lastDomUpdate = 0;

        const startAutoStepBtn = document.getElementById('start-auto-step-btn');
        const autoStepTimeInput = document.getElementById('auto-step-time');
        const autoStepHighInput = document.getElementById('auto-step-high');
        const autoStepLowInput = document.getElementById('auto-step-low');

        startAutoStepBtn.addEventListener('click', () => {
            if (autoStepActive) {
                autoStepActive = false;
                cancelAnimationFrame(autoStepAnimId);
                startAutoStepBtn.innerText = 'Start';
                startAutoStepBtn.style.backgroundColor = 'var(--info)';
                return;
            }

            autoStepDurationMs = (parseFloat(autoStepTimeInput.value) || 15) * 1000;
            autoStepStartTime = 0; 
            autoStepActive = true;
            startAutoStepBtn.innerText = 'Stop';
            startAutoStepBtn.style.backgroundColor = 'var(--danger)';
            autoStepAnimId = requestAnimationFrame(runAutoStepDrop);
        });

        function runAutoStepDrop(timestamp) {
            if (!autoStepActive) return;
            if (!autoStepStartTime) autoStepStartTime = timestamp;
            
            let elapsed = timestamp - autoStepStartTime;

            // LOOP LOGIC: Shift start time cleanly to prevent drift
            if (elapsed >= autoStepDurationMs) {
                autoStepStartTime += autoStepDurationMs; 
                elapsed = timestamp - autoStepStartTime;
            }

            let progress = elapsed / autoStepDurationMs;

            // Fetch dynamic boundaries (allows user to change them while loop is running)
            // Math.max guarantees we never divide by exactly 0 or calculate log(0)
            const highVal = Math.max(0.000001, parseFloat(autoStepHighInput.value) || 1.0);
            const lowVal = Math.max(0.000001, parseFloat(autoStepLowInput.value) || 0.0001);

            // Exponential Interpolation formula works for both ascending and descending
            const currentStep = highVal * Math.pow((lowVal / highVal), progress);
            
            if (tracks.length > 0) {
                const baseScale = tracks[0].scale; 
                for (let i = 0; i < tracks.length; i++) {
                    tracks[i].scale = baseScale + (i * currentStep);
                }
            }

            // UI Throttle: update DOM inputs every 100ms
            if (timestamp - lastDomUpdate > 100) {
                stepSizeInput.value = currentStep.toFixed(4);
                for (let i = 0; i < tracks.length; i++) {
                    const inputEl = document.getElementById(`scale-input-${i}`);
                    if (inputEl) inputEl.value = tracks[i].scale.toFixed(4);
                }
                lastDomUpdate = timestamp;
            }

            if (autoStepActive) {
                autoStepAnimId = requestAnimationFrame(runAutoStepDrop);
            }
        }
        // ------------------------------------------

        // Gate & AuraConv Routing
        document.getElementById('gate-enable-toggle').addEventListener('change', (e) => { inToggleEnabled = e.target.checked; sampleCounter = 0; });
        document.getElementById('gate-ms').addEventListener('input', (e) => { inToggleMs = Math.max(0.1, parseFloat(e.target.value) || 100); });
        
        function updateOutputGate() {
            if (!audioContext || !outputGain || !chopperOsc) return;
            const enabled = outGateToggleBtn.checked;
            const ms = Math.max(0.1, parseFloat(outGateMsInput.value) || 100);
            const freq = 1000 / (2 * ms); 
            if (enabled) {
                outputGain.gain.value = 0.5; 
                chopperOsc.frequency.setValueAtTime(freq, audioContext.currentTime);
                try { chopperGain.connect(outputGain.gain); } catch(e){}
            } else {
                try { chopperGain.disconnect(outputGain.gain); } catch(e){}
                outputGain.gain.value = 1.0; 
            }
        }

        outGateToggleBtn.addEventListener('change', updateOutputGate);
        outGateMsInput.addEventListener('input', updateOutputGate);

        document.getElementById('ac-reverb').addEventListener('change', updateFXRouting);
        document.getElementById('ac-rotate').addEventListener('change', updateFXRouting);

        audioOutputToggle.addEventListener('change', (e) => {
            if (!isRunning || !outputGain || !audioContext) return;
            e.target.checked ? outputGain.connect(audioContext.destination) : outputGain.disconnect(audioContext.destination);
        });

        echoToggle.addEventListener('change', () => { if (isRunning) { toggleMic(); setTimeout(toggleMic, 200); }});

        function generateImpulseResponse(ctx) {
            const sampleRate = ctx.sampleRate;
            const length = sampleRate * 2.0; 
            const impulse = ctx.createBuffer(2, length, sampleRate);
            for (let c = 0; c < 2; c++) {
                const channelData = impulse.getChannelData(c);
                for (let i = 0; i < length; i++) {
                    channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 3);
                }
            }
            return impulse;
        }

        function updateFXRouting() {
            if (!audioContext) return;
            try { fxHubIn.disconnect(); } catch(e){}
            try { convolver.disconnect(); } catch(e){}
            try { panner.disconnect(); } catch(e){}
            
            let currentOut = fxHubIn;
            if (document.getElementById('ac-reverb').checked) { currentOut.connect(convolver); currentOut = convolver; }
            if (document.getElementById('ac-rotate').checked) { currentOut.connect(panner); currentOut = panner; }
            currentOut.connect(fxHubOut);
        }

        async function toggleMic() {
            if (isRunning) {
                if (isRecording) stopRecording();
                cancelAnimationFrame(animationId);
                if (stream) stream.getTracks().forEach(track => track.stop());
                if (audioContext) audioContext.close();
                micBtn.innerText = 'Start Microphone';
                micBtn.classList.remove('active');
                isRunning = false;
                return;
            }

            try {
                const useEcho = echoToggle.checked;
                stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: useEcho, noiseSuppression: useEcho, autoGainControl: useEcho } });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                microphone = audioContext.createMediaStreamSource(stream);

                liveMathNode = audioContext.createScriptProcessor(1024, 1, 1);
                liveMathNode.onaudioprocess = (e) => {
                    const input = e.inputBuffer.getChannelData(0);
                    const output = e.outputBuffer.getChannelData(0);
                    
                    const acEnabled = document.getElementById('ac-enable').checked;
                    const acSamples = parseInt(document.getElementById('ac-samples').value) || 100;
                    const acBurst = document.getElementById('ac-mode').value === 'burst';
                    
                    const inGateEnabled = document.getElementById('gate-enable-toggle').checked;
                    const inGateSamples = (parseFloat(document.getElementById('gate-ms').value) / 1000) * audioContext.sampleRate;

                    for (let i = 0; i < input.length; i++) {
                        let allowed = true;
                        if (inGateEnabled && (Math.floor(globalSampleCounter / inGateSamples) % 2 !== 0)) allowed = false;
                        if (acEnabled) {
                            const chunk = Math.floor(globalSampleCounter / acSamples);
                            const isEven = chunk % 2 === 0;
                            if (acBurst ? !isEven : isEven) allowed = false;
                        }
                        output[i] = allowed ? input[i] : 0;
                        globalSampleCounter++;
                    }
                };

                analyser = audioContext.createAnalyser();
                analyser.fftSize = 1024;
                dataArray = new Float32Array(analyser.frequencyBinCount);

                fxHubIn = audioContext.createGain();
                fxHubOut = audioContext.createGain();
                outputGain = audioContext.createGain();
                outputGain.gain.value = 1.0;

                convolver = audioContext.createConvolver();
                convolver.buffer = generateImpulseResponse(audioContext);
                panner = audioContext.createPanner();
                panner.panningModel = 'HRTF';
                
                keepAliveGain = audioContext.createGain();
                keepAliveGain.gain.value = 0;
                liveMathNode.connect(keepAliveGain);
                keepAliveGain.connect(audioContext.destination);

                chopperOsc = audioContext.createOscillator();
                chopperOsc.type = 'square';
                chopperGain = audioContext.createGain();
                chopperGain.gain.value = 0.5; 
                chopperOsc.connect(chopperGain);
                chopperOsc.start();

                microphone.connect(liveMathNode);
                liveMathNode.connect(analyser);
                analyser.connect(fxHubIn);
                
                updateFXRouting();
                fxHubOut.connect(outputGain);
                
                if (audioOutputToggle.checked) outputGain.connect(audioContext.destination);
                updateOutputGate();

                micBtn.innerText = 'Stop Microphone';
                micBtn.classList.add('active');
                isRunning = true;
                globalSampleCounter = 0;
                masterCanvas.width = masterCanvas.clientWidth;
                masterCanvas.height = masterCanvas.clientHeight;

                processAudioMath();
            } catch (err) { alert('Error accessing microphone: ' + err); }
        }

        // --- RECORDING ENGINE ---
        recordBtn.addEventListener('click', () => {
            if (!isRunning) { alert("Please Start Microphone first!"); return; }
            if (isRecording) stopRecording(); else startRecording();
        });

        function startRecording() {
            const format = recordFormatInput.value;
            const limitMins = parseFloat(recordLimitInput.value) || 5;
            isRecording = true;
            recordBtn.innerText = '⏹ Stop Recording';
            recordBtn.classList.add('record-active');
            recordStatus.innerText = `Recording (${limitMins}m limit)...`;

            const dest = audioContext.createMediaStreamDestination();
            outputGain.connect(dest);

            if (format === 'wav') {
                wavAudioBuffer =[];
                scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                dest.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination); 
                scriptProcessor.onaudioprocess = (e) => wavAudioBuffer.push(new Float32Array(e.inputBuffer.getChannelData(0)));
            } else {
                let mimeType = format === 'flac' ? 'audio/flac' : 'audio/webm;codecs=opus';
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'audio/webm;codecs=opus';
                    recordFormatInput.value = 'opus';
                }
                recordedChunks =[];
                mediaRecorder = new MediaRecorder(dest.stream, { mimeType: mimeType });
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: mimeType });
                    triggerDownload(blob, `MicScaler_Output.${mimeType.includes('flac') ? 'flac' : 'webm'}`);
                };
                mediaRecorder.start(100); 
            }
            recordTimeout = setTimeout(() => { if (isRecording) stopRecording(); }, limitMins * 60 * 1000);
        }

        function stopRecording() {
            isRecording = false;
            recordBtn.innerText = '⏺ Start Recording';
            recordBtn.classList.remove('record-active');
            recordStatus.innerText = 'Compiling audio file...';
            clearTimeout(recordTimeout);

            if (recordFormatInput.value === 'wav' && scriptProcessor) {
                scriptProcessor.disconnect();
                outputGain.disconnect(scriptProcessor);
                compileWAVFile();
            } else if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
        }

        function compileWAVFile() {
            const totalLength = wavAudioBuffer.reduce((acc, arr) => acc + arr.length, 0);
            const flattened = new Float32Array(totalLength);
            let offset = 0;
            for (let arr of wavAudioBuffer) { flattened.set(arr, offset); offset += arr.length; }

            const sampleRate = audioContext.sampleRate;
            const buffer = new ArrayBuffer(44 + flattened.length * 2);
            const view = new DataView(buffer);
            const writeString = (v, off, str) => { for (let i=0; i<str.length; i++) v.setUint8(off + i, str.charCodeAt(i)); };
            
            writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + flattened.length * 2, true);
            writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            writeString(view, 36, 'data'); view.setUint32(40, flattened.length * 2, true);

            let pcmOffset = 44;
            for (let i = 0; i < flattened.length; i++, pcmOffset += 2) {
                let s = Math.max(-1, Math.min(1, flattened[i]));
                view.setInt16(pcmOffset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            triggerDownload(new Blob([view], { type: 'audio/wav' }), 'MicScaler_Output.wav');
        }

        function triggerDownload(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none'; a.href = url; a.download = filename;
            document.body.appendChild(a); a.click();
            setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); recordStatus.innerText = "Saved successfully!"; }, 100);
        }

        function processAudioMath() {
            if (!isRunning) return;
            animationId = requestAnimationFrame(processAudioMath);
            analyser.getFloatTimeDomainData(dataArray);
            
            if (document.getElementById('ac-rotate').checked && panner) {
                const t = audioContext.currentTime;
                panner.positionX.setValueAtTime(Math.sin(t * 2.0) * 2, t);
                panner.positionZ.setValueAtTime(Math.cos(t * 2.0) * 2, t);
            }

            const dataLength = dataArray.length;
            const globalPolarity = masterInvertToggle.checked ? -1 : 1;
            const patternEnabled = patternInvertToggle.checked;
            const patternN = parseInt(patternInvertNth.value);

            // Core Math
            for (let t = 0; t < tracks.length; t++) {
                const scaleMultiplier = tracks[t].scale / 100;
                let patternPolarity = 1;
                if (patternEnabled && ((t + 1) % patternN === 0)) patternPolarity = -1;
                
                const netPolarity = globalPolarity * (tracks[t].invert ? -1 : 1) * patternPolarity;
                for (let i = 0; i < dataLength; i++) {
                    const scaledDataOutput = dataArray[i] * scaleMultiplier * netPolarity;
                }
            }

            masterCtx.fillStyle = '#000000';
            masterCtx.fillRect(0, 0, masterCanvas.width, masterCanvas.height);
            masterCtx.lineWidth = 2;
            masterCtx.strokeStyle = globalPolarity === -1 ? '#cf6679' : '#bb86fc'; 
            masterCtx.beginPath();

            const sliceWidth = masterCanvas.width / dataLength;
            const heightHalf = masterCanvas.height / 2;
            let x = 0;

            for (let i = 0; i < dataLength; i++) {
                const y = ((dataArray[i] * globalPolarity) * heightHalf) + heightHalf;
                i === 0 ? masterCtx.moveTo(x, y) : masterCtx.lineTo(x, y);
                x += sliceWidth;
            }
            masterCtx.stroke();
        }

        numTracksInput.addEventListener('change', initTracks);
        micBtn.addEventListener('click', toggleMic);

        initTracks();
    </script>
</body>
